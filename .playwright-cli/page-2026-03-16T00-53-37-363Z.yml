              - generic [ref=e212]: 今天 08:45
            - article [ref=e213]:
              - generic [ref=e214]: OpenCrab
              - paragraph [ref=e215]: 1. **降低等待焦虑** 用户在等待时，最怕的是“没有反应，不知道系统是不是卡住了”；流式展示能让人立刻看到任务正在推进。 2. **增强过程可理解性** 哪怕不展示全部细节，至少让用户知道现在在查什么、做到哪一步、为什么还没结束，这样结果更容易被信任。 3. **便于及时纠偏** 如果用户发现方向错了，可以在中途打断或补充信息，不必等到整段结果生成完再返工。 一句话总结：**流式 thinking 展示的必要性，在于它把“黑盒等待”变成“可见过程”，同时提升信任、效率和可控性。**
